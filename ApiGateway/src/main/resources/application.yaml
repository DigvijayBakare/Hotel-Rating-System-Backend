spring:
  application:
    name: Api-Gateway

  cloud:
    gateway:
      routes:
        - id: User-Service
          uri: lb://USERSERVICE
          predicates:
            - Path=/users/**
        - id: Hotel-Service
          uri: lb://HOTELSERVICE
          predicates:
            - Path=/hotel/**,/staffs/**
        - id: Rating-Service
          uri: lb://RATINGSERVICE
          predicates:
            - Path=/ratings/**

  config:
    import: optional:configserver:http://localhost:8085

server:
  port: 8084

